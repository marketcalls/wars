name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      # The vendored waproto crate validates a SHA256 of whatsapp.proto /
      # whatsapp.desc in its build.rs. Windows runners default to
      # core.autocrlf=true, which rewrites LF→CRLF on checkout and breaks the
      # checksum. Force LF before checkout (no-op on Linux/macOS).
      - name: Keep LF line endings (waproto checksum)
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Create venv and install maturin
        run: |
          uv venv
          uv pip install maturin

      - name: Build & install
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          maturin develop --release

      - name: Smoke import
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          python -c "import wars; from wars import WhatsApp, Message, qr_to_data_url; print('wars', wars.__version__)"

  fmt:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --release -- -D warnings
