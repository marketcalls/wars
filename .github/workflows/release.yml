name: Release

# Triggered by pushing a tag like `v0.1.0`. Builds wheels for every target
# platform in parallel, then publishes them to PyPI via OIDC trusted
# publishing (no API token in repo secrets).
#
# Setup checklist (one-time):
#   1. Create the GitHub repo at github.com/marketcalls/wars and push this code.
#   2. On PyPI, configure a Trusted Publisher under the `wars` project pointing
#      at this workflow: https://pypi.org/manage/account/publishing/
#      Owner: marketcalls   Repo: wars   Workflow: release.yml   Env: pypi
#   3. Create a GitHub Environment named `pypi` (Settings → Environments).
#   4. Push a tag: `git tag v0.1.0 && git push --tags`.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: 2_28
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: 2_28
          - os: macos-13              # Intel
            target: x86_64-apple-darwin
          - os: macos-14              # Apple Silicon
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive       # pulls in vendor/whatsapp-rust

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
          # abi3 wheels — one wheel per platform covers Python 3.8 onwards.
          # `maturin build` is wheels-only by default; we deliberately skip
          # sdist because the `path = "vendor/whatsapp-rust"` dep does not
          # resolve from a tarball.

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/wars
    permissions:
      id-token: write              # required for OIDC trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # No password — OIDC trusted publishing
